services:
  postgres:
    image: postgres:15-alpine
    container_name: mario_mikke_medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa_backend
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - medusa_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mario_mikke_medusa_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "medusa"]
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  medusa_postgres_data:
