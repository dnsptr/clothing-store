name: Deploy to GitHub Pages

# Single deploy path for the static storefront export. Runs only on push to main
# (plus manual dispatch). All CI checks live in ci.yml, so this workflow is only
# responsible for building the artifact and publishing it to Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Token permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel an in-progress run when a newer commit
# lands on main so Pages always reflects the latest main.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # No static_site_generator here on purpose: basePath/assetPrefix are set in
      # next.config.ts, and letting configure-pages inject them too would double
      # the base path. public/.nojekyll is copied into out/ by the export.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
